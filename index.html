    const grid = document.getElementById('jerseyGrid')
    const cells = grid.children
    jerseyData.forEach(entry => {
        const name = `${entry[1]}<br>(${entry[0]})`
        const file = entry[1]
        const primary = entry[2]
        const secondary = entry[3]
        if (primary === secondary) return
        const index = (secondary + 1) * 6 + (primary + 1)
        const targetCell = cells[index]
        if (!targetCell) return
        const jerseyDiv = document.createElement('a')
        jerseyDiv.classList.add('jersey')
        jerseyDiv.style.backgroundImage = `url('./assets/jerseys/${file}.webp')`
        jerseyDiv.innerHTML = name
        jerseyDiv.href = `https://civilization.fandom.com/wiki/${entry[1].replaceAll(' ', '_')}_(Civ6)`
        jerseyDiv.target = "_blank"
        targetCell.appendChild(jerseyDiv)
    })
